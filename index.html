<!DOCTYPE HTML>
<head>
  <title>Pting Who Soundboard</title>
  <style>
    :root {
      --azure-radiance-color: #0B74E5FF;
      --thunderbird-color: #D72A18;
      --text-blue: var(--azure-radiance-color);
      --text-red: var(--thunderbird-color);
      --btn-size: 150px;
      --container-max-width: 1500px;
    }

    html,
    body {
      font-family: "Noto Sans", sans-serif, "Noto Color Emoji";
    }

    .p-0 {
      padding: 0
    }

    .hand {
      cursor: pointer
    }

    .position-relative {
      position: relative !important
    }

    .container {
      width: 100%;
      margin-right: auto;
      margin-left: auto;
      max-width: var(--container-max-width);
    }

    main {
      text-align: center;
      margin: 40px auto;
    }

    .soundboard {
      margin: 35px 0;
      padding: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 32px 32px;
      justify-content: center;
    }

    .sound-item {
      width: var(--btn-size);
      word-wrap: break-word;
    }

    .sound-btn {
      background-color: #fff0;
      border: none;
    }

    .sound-btn:hover {
      transform: scale(1.1);
    }

    .sound-button-wrapper:active {
      transform: scaleY(.8)
    }

    .sound-button-wrapper svg {
      height: var(--btn-size);
      width: var(--btn-size);
    }

    .sound-btn-img {
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 65%;
      height: 65%;
      object-fit: cover;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
    }

    .sound-button-text {
      margin-top: 4px;
      word-break: break-word;
      min-height: 42px;
      overflow: hidden;
    }

    .text-blue {
      color: var(--text-blue);
    }

    .text-red {
      color: var(--text-red);
    }
  </style>
</head>

<body>
  <main>

  </main>

  <script>
    let audioPlayer = new Audio;

    function togglePlay(e) {
      const data_src = e.getAttribute("data-src")
      if (data_src) {
        audioPlayer.src = data_src
        audioPlayer.play()
      }
    }

    function pause() {
      audioPlayer.pause()
    }
  </script>
