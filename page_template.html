<!DOCTYPE HTML>
<head>
  <title>{page.title}</title>
  <style>
    :root {{
      {make.cssRoot.colors}
      {make.cssRoot.aliases}
      --btn-size: {page.btnSize};
      --container-max-width: {page.containerMaxWidth};
    }}

    html,
    body {{
      font-family: {page.fontFamily};
    }}

    .p-0 {{
      padding: 0
    }}

    .hand {{
      cursor: pointer
    }}

    .position-relative {{
      position: relative !important
    }}

    .container {{
      width: 100%;
      margin-right: auto;
      margin-left: auto;
      max-width: var(--container-max-width);
    }}

    main {{
      text-align: center;
      margin: 40px auto;
    }}

    .soundboard {{
      margin: 35px 0;
      padding: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 32px 32px;
      justify-content: center;
    }}

    .sound-item {{
      width: var(--btn-size);
      word-wrap: break-word;
    }}

    .sound-btn {{
      background-color: #fff0;
      border: none;
    }}

    .sound-btn:hover {{
      transform: scale(1.1);
    }}

    .sound-button-wrapper:active {{
      transform: scaleY(.8)
    }}

    .sound-button-wrapper svg {{
      height: var(--btn-size);
      width: var(--btn-size);
    }}

    .sound-btn-img {{
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 65%;
      height: 65%;
      object-fit: cover;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
    }}

    .sound-button-text {{
      margin-top: 4px;
      word-break: break-word;
      min-height: 42px;
      overflow: hidden;
    }}

    {make.css.textColors}
  </style>
</head>

<body>
  <main>

    <div class="container">

  <script>
    let audioPlayer = new Audio;

    function togglePlay(e) {{
      const data_src = e.getAttribute("data-src")
      if (data_src) {{
        audioPlayer.src = data_src
        audioPlayer.play()
      }}
    }}

    function pause() {{
      audioPlayer.pause()
    }}
  </script>
